scenario_defaults:
  archive_only:
    title: Archive-only
    description: Storage-led estimate with no persistent SQL warehouse.
    storage_class_by_cloud:
      aws: s3_intelligent_tiering
      azure: adls_cool
      gcp: nearline
    sql:
      queries_per_month: 0
      average_query_runtime_minutes: 0
      concurrent_users: 0
      auto_stop_minutes: 0
      warehouse_size: xs
      apply_concurrency_multiplier: false
    jobs:
      enabled: false
      ingestion_frequency: monthly
      batch_type: one_time_archive_load
      data_volume_per_run_gb: 0
      compute_type: classic_jobs
      job_runs_per_month: 0
      average_job_runtime_minutes: 0
      job_cluster_size: small
      number_of_jobs: 0
    streaming_ingestion:
      enabled: false
    ai_bi:
      enabled: false
  basic_query:
    title: Basic query
    description: Storage plus low-frequency SQL access for occasional business queries.
    storage_class_by_cloud:
      aws: s3_standard
      azure: adls_hot
      gcp: standard
    sql:
      queries_per_month: 50
      average_query_runtime_minutes: 3
      concurrent_users: 3
      warehouse_size: xs
      apply_concurrency_multiplier: false
    jobs:
      enabled: true
      ingestion_frequency: monthly
      batch_type: one_time_archive_load
      data_volume_per_run_gb: 0
      compute_type: classic_jobs
      job_runs_per_month: 1
      average_job_runtime_minutes: 30
      job_cluster_size: small
      number_of_jobs: 1
    streaming_ingestion:
      enabled: false
    ai_bi:
      enabled: false
  scheduled_reporting:
    title: Scheduled reporting
    description: Storage, recurring jobs, dashboard refreshes, and light warehouse usage.
    storage_class_by_cloud:
      aws: s3_standard
      azure: adls_hot
      gcp: standard
    sql:
      queries_per_month: 250
      average_query_runtime_minutes: 4
      concurrent_users: 5
      warehouse_size: small
      apply_concurrency_multiplier: false
    jobs:
      enabled: true
      ingestion_frequency: daily
      batch_type: scheduled_batch
      data_volume_per_run_gb: 0
      compute_type: classic_jobs
      job_runs_per_month: 30
      average_job_runtime_minutes: 20
      job_cluster_size: small
      number_of_jobs: 2
    streaming_ingestion:
      enabled: false
    ai_bi:
      enabled: false
  self_service_analytics:
    title: Self-service analytics
    description: Higher query volume, more users, and larger SQL compute.
    storage_class_by_cloud:
      aws: s3_standard
      azure: adls_hot
      gcp: standard
    sql:
      queries_per_month: 1500
      average_query_runtime_minutes: 5
      concurrent_users: 20
      warehouse_size: medium
      apply_concurrency_multiplier: true
    jobs:
      enabled: true
      ingestion_frequency: daily
      batch_type: scheduled_batch
      data_volume_per_run_gb: 0
      compute_type: classic_jobs
      job_runs_per_month: 30
      average_job_runtime_minutes: 35
      job_cluster_size: medium
      number_of_jobs: 3
    streaming_ingestion:
      enabled: false
    ai_bi:
      enabled: false
  future_ai_bi:
    title: Future AI/BI or Genie-style usage
    description: Optional future layer that adds natural-language question workloads.
    storage_class_by_cloud:
      aws: s3_standard
      azure: adls_hot
      gcp: standard
    sql:
      queries_per_month: 1000
      average_query_runtime_minutes: 5
      concurrent_users: 25
      warehouse_size: medium
      apply_concurrency_multiplier: true
    jobs:
      enabled: true
      ingestion_frequency: daily
      batch_type: scheduled_batch
      data_volume_per_run_gb: 0
      compute_type: classic_jobs
      job_runs_per_month: 30
      average_job_runtime_minutes: 35
      job_cluster_size: medium
      number_of_jobs: 3
    streaming_ingestion:
      enabled: false
    ai_bi:
      enabled: true
      expected_users: 25
      questions_per_user_per_month: 20
      average_runtime_minutes_per_question: 2
      dbu_per_hour: 16

